<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보과 교육과정 산성비</title>
    <style>
        /* 클래식 윈도우 감성 폰트 */
        body {
            font-family: 'Gulim', '돋움', 'Dotum', sans-serif;
            background-color: #EFEFCA; /* 사진과 비슷한 연한 베이지/노란색 배경 */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 상단 네비게이션 바 */
        #top-bar {
            background-color: #000080; /* 남색 */
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 5px 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .top-menu span { margin-right: 15px; cursor: pointer; }
        .top-msg { flex-grow: 1; text-align: center; }

        /* 하단 물결 무늬 및 상태 바 */
        #bottom-area {
            position: absolute;
            bottom: 0;
            width: 100%;
        }
        
        .waves {
            height: 60px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg"><path d="M0,50 Q100,0 200,50 T400,50 T600,50 T800,50 T1000,50 L1000,100 L0,100 Z" fill="%2340c0e0" opacity="0.7"/><path d="M0,70 Q100,20 200,70 T400,70 T600,70 T800,70 T1000,70 L1000,100 L0,100 Z" fill="%2320a0d0"/></svg>') repeat-x;
            background-size: 500px 100%;
        }

        #status-bar {
            background-color: #C0C0C0;
            border-top: 2px solid #FFF;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        #status-bar div {
            padding: 4px 10px;
            border-right: 2px solid #808080;
            border-left: 2px solid #FFF;
        }
        #status-bar .main-status { flex-grow: 1; border-left: none; }

        /* 클래식 윈도우 창 UI */
        .window {
            background-color: #C0C0C0;
            border-top: 2px solid #FFF;
            border-left: 2px solid #FFF;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            width: 500px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .window-header {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .window-content { padding: 15px; }

        .list-box {
            background: white;
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #FFF;
            border-bottom: 2px solid #FFF;
            height: 150px;
            margin-bottom: 15px;
            padding: 5px;
            overflow-y: scroll;
        }

        select {
            width: 100%;
            margin-bottom: 10px;
            padding: 3px;
            font-family: 'Gulim';
        }

        .button-group { text-align: center; margin-top: 15px; }
        
        button {
            background-color: #C0C0C0;
            border-top: 2px solid #FFF;
            border-left: 2px solid #FFF;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            padding: 5px 20px;
            font-family: 'Gulim';
            font-size: 14px;
            cursor: pointer;
            margin: 0 5px;
        }
        button:active {
            border-top: 2px solid #404040;
            border-left: 2px solid #404040;
            border-right: 2px solid #FFF;
            border-bottom: 2px solid #FFF;
        }

        /* 게임 화면 영역 (시작 시 창은 사라지고 단어가 떨어질 곳) */
        #game-area {
            position: absolute;
            top: 30px;
            bottom: 60px;
            left: 0;
            width: 100%;
            display: none; /* 초기에는 숨김 */
        }
        
        .falling-word {
            position: absolute;
            color: #000080;
            font-weight: bold;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.7);
            padding: 2px 5px;
            border: 1px solid #000080;
        }

        #typing-area {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            text-align: center;
        }
        
        #input-word {
            font-family: 'Gulim';
            font-size: 20px;
            padding: 5px;
            width: 300px;
            border: 2px inset #FFF;
        }
    </style>
    <script src="data.js"></script>
</head>
<body>

    <div id="top-bar">
        <div class="top-menu"><span>배경색</span><span>마이페이지</span></div>
        <div class="top-msg"> =^^= 님이 입장하셨습니다. (목표: 임용 합격!)</div>
        <div class="top-menu"><span>로그아웃</span><span>랭킹</span></div>
    </div>

    <div class="window" id="setup-window">
        <div class="window-header">
            <span>Select stage</span>
            <span>X</span>
        </div>
        <div class="window-content">
            <div style="text-align: center; margin-bottom: 10px;">스테이지를 선택하세요!</div>
            
            <div class="list-box" id="menu-box">
                <label>학교급/과목:</label>
                <select id="sel-school"></select>
                
                <label>단원:</label>
                <select id="sel-unit"></select>
                
                <label>유형:</label>
                <select id="sel-type"></select>
            </div>

            <div style="text-align: center;">
                <label>플레이 할 모드를 선택하세요 (1 - 3)</label><br>
                <select id="sel-mode" style="width: 200px; margin-top: 5px;">
                    <option value="1">모드 1: 빈칸 요격</option>
                    <option value="2">모드 2: 청킹 격파</option>
                    <option value="3">모드 3: 초성 비 내리기</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="startGame()">플레이</button>
                <button>만들기</button>
            </div>
        </div>
    </div>

    <div id="game-area"></div>
    
    <div id="typing-area">
        <div id="question-text" style="background: white; border: 2px solid #404040; padding: 10px; margin-bottom: 10px; font-weight: bold;"></div>
        <input type="text" id="input-word" placeholder="정답 입력..." autocomplete="off">
    </div>

    <div id="bottom-area">
        <div class="waves"></div>
        <div id="status-bar">
            <div class="main-status">스테이지를 고르고 '플레이'를 눌러 게임을 시작해보세요.</div>
            <div>점수: <span id="score-display">0</span></div>
            <div>생명: <span id="lives-display">5</span></div>
            <div style="font-weight: bold;">산성비</div>
        </div>
    </div>

    <script>
        // ---------------------------------------------
        // 1. 메뉴 초기화 및 연동 로직 (기존 코드)
        // ---------------------------------------------
        const selSchool = document.getElementById("sel-school");
        const selUnit = document.getElementById("sel-unit");
        const selType = document.getElementById("sel-type");

        function initSelects() {
            if(typeof db === 'undefined') {
                alert("data.js 파일을 찾을 수 없습니다!"); return;
            }
            selSchool.innerHTML = "";
            for (let school in db) {
                let opt = document.createElement("option");
                opt.value = school; opt.innerText = school;
                selSchool.appendChild(opt);
            }
            updateUnits();
        }

        function updateUnits() {
            let school = selSchool.value;
            selUnit.innerHTML = "";
            for (let unit in db[school]) {
                let opt = document.createElement("option");
                opt.value = unit; opt.innerText = unit;
                selUnit.appendChild(opt);
            }
            updateTypes();
        }

        function updateTypes() {
            let school = selSchool.value;
            let unit = selUnit.value;
            selType.innerHTML = "";
            for (let type in db[school][unit]) {
                let opt = document.createElement("option");
                opt.value = type; opt.innerText = type;
                selType.appendChild(opt);
            }
        }

        selSchool.addEventListener("change", updateUnits);
        selUnit.addEventListener("change", updateTypes);
        window.onload = initSelects;

        // ---------------------------------------------
        // 2. 산성비 게임 로직 (클로드가 작성한 코드)
        // ---------------------------------------------
        let score = 0;
        let lives = 5;
        let gameLoopId = null;       // requestAnimationFrame ID
        let spawnTimerId = null;     // setInterval ID (단어 생성)
        let fallingWords = [];       // 현재 화면에 떨어지는 단어 객체 배열
        let currentMode = 1;
        let currentItems = [];       // 현재 선택된 성취기준 배열
        let chunkIndex = 0;          // 모드2 전용: 현재 청킹 인덱스
        let chunkItemIndex = 0;      // 모드2 전용: 현재 성취기준 인덱스

        const gameArea   = document.getElementById("game-area");
        const inputWord  = document.getElementById("input-word");
        const questionEl = document.getElementById("question-text");
        const scoreEl    = document.getElementById("score-display");
        const livesEl    = document.getElementById("lives-display");
        const statusEl   = document.querySelector(".main-status");

        // ---------- 유틸 ----------
        /** 띄어쓰기·공백 제거 후 비교 */
        function normalize(str) {
            return str.replace(/\s/g, "");
        }

        /** 배열에서 랜덤 요소 */
        function randFrom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        /** 0~(max-width) 사이 랜덤 X */
        function randX(width = 80) {
            return Math.random() * (gameArea.clientWidth - width);
        }

        // ---------- 화면 리셋 ----------
        function resetGameScreen() {
            fallingWords.forEach(w => w.el && w.el.remove());
            fallingWords = [];
            chunkIndex = 0;
            chunkItemIndex = 0;
            score = 0;
            lives = 5;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnTimerId);
        }

        // ---------- 생명 감소 & 게임오버 ----------
        function loseLife() {
            lives--;
            livesEl.textContent = lives;
            if (lives <= 0) {
                endGame();
            }
        }

        function endGame() {
            cancelAnimationFrame(gameLoopId);
            clearInterval(spawnTimerId);
            fallingWords.forEach(w => w.el && w.el.remove());
            fallingWords = [];
            setTimeout(() => {
                alert(`게임 오버!\n최종 점수: ${score}점`);
                returnToSetup();
            }, 100);
        }

        function returnToSetup() {
            resetGameScreen();
            document.getElementById("setup-window").style.display = "block";
            document.getElementById("game-area").style.display = "none";
            document.getElementById("typing-area").style.display = "none";
            statusEl.textContent = "스테이지를 고르고 '플레이'를 눌러 게임을 시작해보세요.";
        }

        // ---------- 단어 엘리먼트 생성 ----------
        function createWordEl(displayText, answerText, x) {
            const el = document.createElement("div");
            el.className = "falling-word";
            el.textContent = displayText;
            el.style.left = x + "px";
            el.style.top  = "0px";
            gameArea.appendChild(el);

            return {
                el,
                display: displayText,
                answer: normalize(answerText),
                y: 0,
                speed: 0.5 + Math.random() * 0.8   // px/frame
            };
        }

        // ---------- 메인 게임 루프 (requestAnimationFrame) ----------
        function gameLoop() {
            const bottomLimit = gameArea.clientHeight;

            for (let i = fallingWords.length - 1; i >= 0; i--) {
                const w = fallingWords[i];
                w.y += w.speed;
                w.el.style.top = w.y + "px";

                if (w.y + w.el.offsetHeight >= bottomLimit) {
                    // 바닥에 닿음
                    w.el.remove();
                    fallingWords.splice(i, 1);
                    loseLife();

                    // 모드2: 못 맞히면 같은 단어 다시 도전
                    if (currentMode === 2) {
                        spawnNextChunk();
                    }
                }
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // ---------- 입력 판별 ----------
        inputWord.addEventListener("keydown", function(e) {
            if (e.key !== "Enter") return;
            const typed = normalize(this.value);
            if (!typed) return;

            let matched = false;

            for (let i = fallingWords.length - 1; i >= 0; i--) {
                const w = fallingWords[i];
                if (normalize(w.answer) === typed) {
                    // 정답!
                    w.el.remove();
                    fallingWords.splice(i, 1);
                    score += 10;
                    scoreEl.textContent = score;
                    this.value = "";
                    matched = true;

                    // 모드2: 다음 청크 생성
                    if (currentMode === 2) {
                        chunkIndex++;
                        spawnNextChunk();
                    }
                    break;
                }
            }

            if (!matched) {
                // 오답 피드백: 입력창 잠깐 빨간색
                this.style.background = "#ffcccc";
                setTimeout(() => { this.style.background = ""; }, 300);
                this.value = "";
            }
        });

        // =============================================
        // 모드 1: 빈칸 요격
        // =============================================
        function startMode1() {
            currentMode = 1;

            // 선택된 성취기준 전체 blanks 수집
            const allBlanks = []; // { display, answer, sourceText }
            currentItems.forEach(item => {
                item.blanks.forEach(blank => {
                    allBlanks.push({ display: blank, answer: blank });
                });
            });

            if (allBlanks.length === 0) { alert("빈칸 데이터가 없습니다."); returnToSetup(); return; }

            // 하단 UI: 현재 성취기준 빈칸 문장 표시 (첫 번째 항목)
            updateBlankQuestion();

            let idx = 0;
            spawnTimerId = setInterval(() => {
                if (fallingWords.length >= 5) return; // 최대 5개 동시 유지
                const item = allBlanks[idx % allBlanks.length];
                fallingWords.push(createWordEl(item.display, item.answer, randX()));
                idx++;
            }, 2500);

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function updateBlankQuestion() {
            if (!currentItems.length) return;
            const item = currentItems[0]; // 첫 성취기준 문장 표시
            let text = item.fullText;
            item.blanks.forEach(b => {
                text = text.replace(new RegExp(b.replace(/\s/g,""), "g"), `[     ]`);
            });
            questionEl.textContent = text;
        }

        // =============================================
        // 모드 2: 청킹 격파
        // =============================================
        function startMode2() {
            currentMode = 2;
            chunkItemIndex = 0;
            chunkIndex = 0;
            questionEl.textContent = "문장을 완성하세요!";
            gameLoopId = requestAnimationFrame(gameLoop);
            spawnNextChunk();
        }

        function spawnNextChunk() {
            // 현재 item의 모든 청크를 다 맞혔으면 다음 item으로
            const item = currentItems[chunkItemIndex];
            if (!item) {
                // 모든 성취기준 완료
                cancelAnimationFrame(gameLoopId);
                clearInterval(spawnTimerId);
                setTimeout(() => {
                    alert(`🎉 모든 청크 완료!\n최종 점수: ${score}점`);
                    returnToSetup();
                }, 200);
                return;
            }

            if (chunkIndex >= item.chunks.length) {
                // 이 item 완료, 다음으로
                chunkItemIndex++;
                chunkIndex = 0;
                spawnNextChunk();
                return;
            }

            const chunk = item.chunks[chunkIndex];
            questionEl.textContent = `[${item.id}] (${chunkIndex + 1}/${item.chunks.length}) 번째 청크를 입력하세요`;
            // 기존 단어 제거 후 새 단어 하나만 생성
            fallingWords.forEach(w => w.el && w.el.remove());
            fallingWords = [];
            fallingWords.push(createWordEl(chunk, chunk, randX()));
        }

        // =============================================
        // 모드 3: 초성 비 내리기
        // =============================================
        function startMode3() {
            currentMode = 3;
            questionEl.textContent = "초성을 보고 단어를 맞혀보세요!";

            // 전체 chosung 쌍 수집
            const allChosung = [];
            currentItems.forEach(item => {
                if (item.chosung) {
                    Object.entries(item.chosung).forEach(([key, val]) => {
                        allChosung.push({ display: key, answer: val });
                    });
                }
            });

            if (allChosung.length === 0) { alert("초성 데이터가 없습니다."); returnToSetup(); return; }

            let idx = 0;
            spawnTimerId = setInterval(() => {
                if (fallingWords.length >= 6) return;
                const item = allChosung[idx % allChosung.length];
                fallingWords.push(createWordEl(item.display, item.answer, randX()));
                idx++;
            }, 2200);

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // =============================================
        // startGame() 오버라이드 (HTML의 onclick에 연결)
        // =============================================
        function startGame() {
            // 선택값 읽기
            const school = document.getElementById("sel-school").value;
            const unit   = document.getElementById("sel-unit").value;
            const type   = document.getElementById("sel-type").value;
            currentMode  = parseInt(document.getElementById("sel-mode").value);

            if (typeof db === 'undefined' || !db[school] || !db[school][unit] || !db[school][unit][type]) {
                alert("데이터를 불러올 수 없습니다. data.js를 확인하세요."); return;
            }

            currentItems = db[school][unit][type];

            // 화면 전환
            document.getElementById("setup-window").style.display = "none";
            document.getElementById("game-area").style.display    = "block";
            document.getElementById("typing-area").style.display  = "block";
            statusEl.textContent = "게임 진행 중... 타자를 치세요!";
            inputWord.value = "";
            inputWord.focus();

            // 상태 초기화
            resetGameScreen();

            // 모드별 시작
            if (currentMode === 1) startMode1();
            else if (currentMode === 2) startMode2();
            else if (currentMode === 3) startMode3();
        }
    </script>
</body>
</html>
