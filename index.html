<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정보과 교육과정 아케이드</title>
    <style>
        /* 레트로 오락실 폰트 (둥근모꼴) 적용 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            font-family: 'DungGeunMo', sans-serif; 
            background-color: #111; /* CRT 모니터 같은 어두운 배경 */
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            color: #00FF00; 
            text-shadow: 0 0 10px #00FF00, 0 0 20px #00FF00; /* 네온사인 효과 */
            margin-top: 20px; 
            font-size: 36px;
        }

        #menu-bar { 
            background: #222; 
            padding: 15px; 
            border: 2px solid #00FF00;
            border-radius: 0; /* 각진 레트로 느낌 */
            margin-bottom: 20px; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            justify-content: center;
            box-shadow: 0 0 10px #00FF00;
        }

        select, button { 
            font-family: 'DungGeunMo', sans-serif;
            padding: 8px 12px; 
            font-size: 16px; 
            border: 1px solid #00FF00; 
            background: #000; 
            color: #00FF00; 
            cursor: pointer;
        }

        button { 
            background: #00FF00; 
            color: #000; 
            font-weight: bold; 
        }

        button:hover { 
            background: #fff; 
            color: #000;
            border-color: #fff;
        }

        #game-container { width: 800px; position: relative; }

        #question-box { 
            background: #000; 
            padding: 15px; 
            font-size: 20px; 
            line-height: 1.5; 
            min-height: 50px; 
            text-align: center; 
            margin-bottom: 10px; 
            border: 2px dashed #FFD700; 
            color: #FFD700;
        }

        /* 게임 보드: 백터 그래픽 감성의 테두리 */
        #game-board { 
            width: 100%; 
            height: 400px; 
            background: #000; 
            border: 4px solid #00FFFF; 
            box-shadow: 0 0 15px #00FFFF, inset 0 0 15px #00FFFF;
            position: relative; 
            overflow: hidden; 
        }

        .word { 
            position: absolute; 
            color: #FF00FF; /* 마젠타 네온 컬러 */
            font-weight: bold; 
            font-size: 22px; 
            text-shadow: 0 0 5px #FF00FF, 0 0 10px #FF00FF; 
        }

        #ui-bar { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 10px; 
            font-size: 24px; 
        }

        #input-word { 
            font-family: 'DungGeunMo', sans-serif;
            width: 100%; 
            padding: 15px; 
            font-size: 24px; 
            text-align: center; 
            background: #000; 
            color: #00FF00; 
            border: 3px solid #00FF00; 
            margin-top: 10px; 
            box-sizing: border-box; 
        }
        #input-word:focus { outline: none; box-shadow: 0 0 10px #00FF00; }

        .highlight { color: #FFF; text-decoration: underline; }
    </style>
    <script src="data.js"></script>
</head>
<body>

    <h1>🕹️ 정보과 교육과정 아케이드</h1>
    
    <div id="menu-bar">
        <select id="sel-school"></select>
        <select id="sel-unit"></select>
        <select id="sel-type"></select>
        <select id="sel-mode">
            <option value="1">모드 1: 빈칸 요격</option>
            <option value="2">모드 2: 청킹 격파</option>
            <option value="3">모드 3: 초성 비 내리기</option>
        </select>
        <button onclick="initGame()">INSERT COIN (시작)</button>
    </div>

    <div id="game-container">
        <div id="question-box">옵션을 선택하고 INSERT COIN을 눌러주세요.</div>
        <div id="game-board"></div>
        <input type="text" id="input-word" placeholder="정답 입력..." disabled autocomplete="off">
        
        <div id="ui-bar">
            <div style="color:#00FFFF; text-shadow: 0 0 5px #00FFFF;">SCORE: <span id="score">0000</span></div>
            <div style="color:#FF0000; text-shadow: 0 0 5px #FF0000;">LIVES: <span id="lives">♥♥♥</span></div>
        </div>
    </div>

    <script>
        // --- 동적 메뉴 연동 로직 ---
        const selSchool = document.getElementById("sel-school");
        const selUnit = document.getElementById("sel-unit");
        const selType = document.getElementById("sel-type");

        // 1. 학교급 세팅
        function initSelects() {
            selSchool.innerHTML = "";
            for (let school in db) {
                let opt = document.createElement("option");
                opt.value = school;
                opt.innerText = school;
                selSchool.appendChild(opt);
            }
            updateUnits(); // 학교가 세팅되면 단원 업데이트
        }

        // 2. 단원 세팅
        function updateUnits() {
            let school = selSchool.value;
            selUnit.innerHTML = "";
            for (let unit in db[school]) {
                let opt = document.createElement("option");
                opt.value = unit;
                opt.innerText = unit;
                selUnit.appendChild(opt);
            }
            updateTypes(); // 단원이 세팅되면 타입(성취기준 등) 업데이트
        }

        // 3. 타입 세팅
        function updateTypes() {
            let school = selSchool.value;
            let unit = selUnit.value;
            selType.innerHTML = "";
            for (let type in db[school][unit]) {
                let opt = document.createElement("option");
                opt.value = type;
                opt.innerText = type;
                selType.appendChild(opt);
            }
        }

        // 선택지가 바뀔 때마다 하위 메뉴 업데이트
        selSchool.addEventListener("change", updateUnits);
        selUnit.addEventListener("change", updateTypes);

        // 페이지가 열리면 메뉴 초기화
        window.onload = initSelects;

        // --- 게임 진행 로직 ---
        let currentMode = 1;
        let currentProblem = null;
        let score = 0, lives = 3;
        let activeWords = [];
        let dropInterval;
        let isPlaying = false;
        let chunkIndex = 0; 

        const board = document.getElementById("game-board");
        const qBox = document.getElementById("question-box");
        const inputField = document.getElementById("input-word");

        function initGame() {
            let school = selSchool.value;
            let unit = selUnit.value;
            let type = selType.value;
            currentMode = parseInt(document.getElementById("sel-mode").value);
            
            const problems = db[school][unit][type];
            if (!problems || problems.length === 0) {
                alert("해당 카테고리에 데이터가 없습니다! data.js를 확인해주세요.");
                return;
            }

            currentProblem = problems[Math.floor(Math.random() * problems.length)];
            
            score = 0; lives = 3; chunkIndex = 0;
            updateUI();
            board.innerHTML = "";
            activeWords = [];
            isPlaying = true;
            inputField.disabled = false;
            inputField.focus();

            renderQuestion();
            clearInterval(dropInterval);
            dropInterval = setInterval(gameLoop, 100);
            spawnWord();
        }

        function renderQuestion() {
            if(currentMode === 1) {
                let text = currentProblem.fullText;
                currentProblem.blanks.forEach(b => {
                    text = text.replace(b, `<span class='highlight'>[ ${"?".repeat(b.length)} ]</span>`);
                });
                qBox.innerHTML = `${currentProblem.id}<br>${text}`;
            } else if (currentMode === 2) {
                qBox.innerHTML = `${currentProblem.id}<br>순서대로 떨어지는 문장 덩어리를 타이핑하세요!`;
            } else if (currentMode === 3) {
                qBox.innerHTML = `${currentProblem.id}<br>초성을 보고 핵심 키워드를 맞추세요!<br><span style="font-size:16px; color:#aaa;">(${currentProblem.fullText})</span>`;
            }
        }

        function spawnWord() {
            if(!isPlaying) return;
            let wordText = "";
            
            if(currentMode === 1) {
                wordText = currentProblem.blanks[Math.floor(Math.random() * currentProblem.blanks.length)];
            } else if (currentMode === 2) {
                if(chunkIndex >= currentProblem.chunks.length) {
                    alert("STAGE CLEAR! 완벽합니다!");
                    initGame(); return;
                }
                wordText = currentProblem.chunks[chunkIndex];
            } else if (currentMode === 3) {
                const keys = Object.keys(currentProblem.chosung);
                wordText = keys[Math.floor(Math.random() * keys.length)];
            }

            createFallingWord(wordText);
            
            if(currentMode !== 2) {
                setTimeout(spawnWord, 2000);
            }
        }

        function createFallingWord(text) {
            const el = document.createElement("div");
            el.className = "word";
            el.innerText = text;
            el.style.left = Math.floor(Math.random() * (board.clientWidth - 150)) + 20 + "px";
            el.style.top = "0px";
            board.appendChild(el);
            activeWords.push({ el: el, text: text, y: 0 });
        }

        function gameLoop() {
            for (let i = activeWords.length - 1; i >= 0; i--) {
                let w = activeWords[i];
                w.y += (currentMode === 2) ? 1.5 : 2.5; 
                w.el.style.top = w.y + "px";

                if (w.y > board.clientHeight - 30) {
                    board.removeChild(w.el);
                    activeWords.splice(i, 1);
                    lives--;
                    updateUI();
                    
                    if(lives <= 0) {
                        isPlaying = false;
                        alert("GAME OVER! 계속 도전하세요.");
                    } else if (currentMode === 2) {
                        createFallingWord(currentProblem.chunks[chunkIndex]);
                    }
                }
            }
        }

        inputField.addEventListener("keypress", function(e) {
            if(e.key === "Enter" && isPlaying) {
                let typed = inputField.value.trim().replace(/\s+/g, ""); 
                inputField.value = "";

                for (let i = 0; i < activeWords.length; i++) {
                    let targetWord = activeWords[i].text;
                    let isCorrect = false;

                    if(currentMode === 1 && targetWord === typed) isCorrect = true;
                    if(currentMode === 2 && targetWord === typed) isCorrect = true;
                    if(currentMode === 3 && currentProblem.chosung[targetWord] === typed) isCorrect = true; 

                    if(isCorrect) {
                        board.removeChild(activeWords[i].el);
                        activeWords.splice(i, 1);
                        score += 100;
                        updateUI();
                        
                        if(currentMode === 2) {
                            chunkIndex++;
                            spawnWord(); 
                        }
                        break;
                    }
                }
            }
        });

        function updateUI() {
            document.getElementById("score").innerText = score.toString().padStart(4, '0');
            document.getElementById("lives").innerText = "♥".repeat(Math.max(0, lives));
        }
    </script>
</body>
</html>
